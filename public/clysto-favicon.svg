<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="12" fill="#232323"/>
  <defs>
    <radialGradient id="cg" cx="42%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d0d0d0"/>
    </radialGradient>
  </defs>
  <!-- White circle -->
  <circle cx="31" cy="33" r="22" fill="url(#cg)"/>
  <!-- Curved swoosh: from left-center, arcing up to top-right with arrowhead -->
  <path d="M 18 36 C 22 24 34 14 47 12" fill="none" stroke="#1c1c1c" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Arrowhead at top-right -->
  <polygon points="47,12 41,12 45,18" fill="#1c1c1c"/>
  <!-- Second curve: from same origin down to bottom-right -->
  <path d="M 18 36 C 28 42 40 46 50 44" fill="none" stroke="#1c1c1c" stroke-width="1.8" stroke-linecap="round"/>
</svg>
